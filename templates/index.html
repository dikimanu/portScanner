<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    SecurePortScanner
</title>

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
>


</head>

<body>


<div class="container">

    <!-- =========================
         HEADER
    ========================== -->
    <h1>SecurePortScanner</h1>

    <p class="subtitle">
        Web-Based Network Port Scanner & Service Analyzer
    </p>

    <!-- =========================
         SCAN FORM
    ========================== -->
    <form
        id="scan-form"
        action="/scan"
        method="POST"
        onsubmit="startProgress()"
    >

        <input
            type="text"
            name="target"
            placeholder="Enter Target IP Address"
            required
        >

        <input
            type="number"
            name="start_port"
            placeholder="Start Port"
            required
        >

        <input
            type="number"
            name="end_port"
            placeholder="End Port"
            required
        >

        <button type="submit" id="scan-button">
            Start Scan
        </button>

    </form>

    <!-- =========================
         PROGRESS BAR
    ========================== -->
    <div
        id="progress-container"
        style="display:none;"
    >

        <p class="progress-text">
            Scanning in progress... this may take a moment depending on the port range
        </p>

        <div class="progress-bar">

            <div
                class="progress-fill indeterminate"
                id="progress-fill"
            ></div>

        </div>

    </div>

</div>

<!-- =========================
     JAVASCRIPT
========================== -->
<script>

    function startProgress() {

        const container =
            document.getElementById("progress-container");

        const button =
            document.getElementById("scan-button");

        container.style.display = "block";

        // Prevent double-submitting while the scan is running
        button.disabled = true;
        button.innerText = "Scanning...";
    }

</script>


</body>

</html>
