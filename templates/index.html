<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    SecurePortScanner
</title>

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
>


</head>

<body>


<div class="container">

    <!-- =========================
         HEADER
    ========================== -->
    <h1>SecurePortScanner</h1>

    <p class="subtitle">
        Web-Based Network Port Scanner & Service Analyzer
    </p>

    <!-- =========================
         SCAN FORM
    ========================== -->
    <form
        id="scan-form"
        action="/scan"
        method="POST"
        onsubmit="startProgress()"
    >

        <input
            type="text"
            name="target"
            placeholder="Enter Target IP Address"
            required
        >

        <input
            type="number"
            name="start_port"
            placeholder="Start Port"
            required
        >

        <input
            type="number"
            name="end_port"
            placeholder="End Port"
            required
        >

        <!-- =========================
             ENGINE SELECTOR
        ========================== -->
        <div class="engine-selector">

            <label class="engine-option">
                <input
                    type="radio"
                    name="engine"
                    value="custom"
                    checked
                >
                Custom Scanner (faster)
            </label>

            <label class="engine-option">
                <input
                    type="radio"
                    name="engine"
                    value="nmap"
                >
                Nmap Scanner (accurate, slower, detects service versions)
            </label>

        </div>

        <button type="submit" id="scan-button">
            <span id="scan-button-icon" class="scan-icon"></span>
            <span id="scan-button-text">Start Scan</span>
        </button>

    </form>

    <!-- =========================
         SCANNING ANIMATION
    ========================== -->
    <div
        id="progress-container"
        style="display:none;"
    >

        <div class="radar-box">

            <div class="radar-sweep"></div>

            <div class="radar-rings"></div>

        </div>

        <p class="progress-text">
            Scanning target<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </p>

        <p class="progress-subtext">
            This may take a moment depending on the port range and engine selected
        </p>

    </div>

</div>

<!-- =========================
     JAVASCRIPT
========================== -->
<script>

    function startProgress() {

        const container =
            document.getElementById("progress-container");

        const button =
            document.getElementById("scan-button");

        const buttonText =
            document.getElementById("scan-button-text");

        const buttonIcon =
            document.getElementById("scan-button-icon");

        container.style.display = "block";

        // Prevent double-submitting while the scan is running
        button.disabled = true;
        button.classList.add("scanning");
        buttonText.innerText = "Scanning...";
        buttonIcon.classList.add("spin");

        // Smoothly scroll to the animation so the user sees it
        container.scrollIntoView({ behavior: "smooth", block: "center" });
    }

</script>


</body>

</html>
